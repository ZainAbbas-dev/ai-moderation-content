# docker-compose.yml
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://database:27017
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  database:
    image: mongo:latest
    ports:
      - "27018:27017"  
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: